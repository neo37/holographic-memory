stages:
  - deploy

# GitLab Pages — publishes the static landing page.
# URL: https://<namespace>.gitlab.io/holographic-memory/
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp index.html public/
    - cp robots.txt public/ 2>/dev/null || true
    - cp sitemap.xml public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
