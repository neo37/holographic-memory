stages:
  - deploy

# GitLab Pages — publishes the static landing page.
# URL: https://<namespace>.gitlab.io/holographic-memory/
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp index.html public/
    - cp robots.txt public/ 2>/dev/null || true
    - cp sitemap.xml public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# Deploy the landing page to the production server (nginx + Let's Encrypt).
# Runs on the default branch; SSH creds come from protected CI/CD variables.
deploy:server:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache openssh-client rsync >/dev/null
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - install -m 600 "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - install -m 644 "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
  script:
    - rsync -az index.html robots.txt sitemap.xml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - echo "Deployed to https://holo.ai3d.art"
