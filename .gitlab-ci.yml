stages:
  - build
  - deploy

# Build the Astro frontend (web/) into static files.
build:
  stage: build
  image: node:22-alpine
  script:
    - cd web
    - npm ci
    - npm run build
  artifacts:
    paths:
      - web/dist
    expire_in: 1 hour

# GitLab Pages — serves the built Astro site.
pages:
  stage: deploy
  image: alpine:latest
  needs: ["build"]
  script:
    - mkdir -p public
    - cp -r web/dist/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# Deploy the built site to the production server (nginx + Let's Encrypt).
deploy:server:
  stage: deploy
  image: alpine:latest
  needs: ["build"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache openssh-client rsync >/dev/null
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - install -m 600 "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - install -m 644 "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
  script:
    - rsync -az --delete web/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - echo "Deployed to https://holo.ai3d.art"
